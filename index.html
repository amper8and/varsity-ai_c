<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Varsity AI | UNIZIK Community Hub</title>
    <meta
      name="description"
      content="A rich mobile demo app for the UNIZIK community hub, designed around campus utility, alumni connection, AI support and curated commerce."
    />
    <meta name="theme-color" content="#0d5c44" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <div class="ambient ambient-three"></div>

    <div class="app-shell">
      <div class="device-frame">
        <div class="app-surface">
          <header class="app-header" id="app-header"></header>
          <main class="app-main" id="app-main"></main>
          <nav class="tab-bar" id="tab-bar" aria-label="Primary navigation"></nav>
        </div>
      </div>
    </div>

    <section class="sheet-overlay hidden" id="sheet-overlay" aria-hidden="true">
      <div class="sheet-backdrop" data-close-sheet="true"></div>
      <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <div>
            <p class="eyebrow">Quick detail</p>
            <h3 id="sheet-title">Detail</h3>
          </div>
          <button class="icon-button subtle" type="button" data-close-sheet="true" aria-label="Close sheet">
            <span class="icon-holder" id="sheet-close-icon"></span>
          </button>
        </div>
        <div class="sheet-body" id="sheet-body"></div>
      </div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
